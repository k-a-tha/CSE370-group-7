<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Login - Comic Platform</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>COMIC PLATFORM</h1>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="comic.html">Comics</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Artist Login</h2>
            <form action="../php/login_artist.php" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="form-submit">Login</button>
            </form>
            <div class="form-link">
                <p>Don't have an artist account? <a href="artist_register.html">Register here</a></p>
                <p>Are you a user? <a href="login.html">User Login</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Comic Platform. All rights reserved.</p>
    </footer>
</body>
</html>
